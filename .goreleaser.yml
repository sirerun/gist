version: 2

builds:
  - main: ./cmd/gist/
    binary: gist
    env:
      - CGO_ENABLED=0
      - GOWORK=off
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore\\(deps\\):"
  groups:
    - title: "Breaking Changes"
      regexp: '^.*?!:.+$'
      order: 0
    - title: "Features"
      regexp: '^feat.*'
      order: 1
    - title: "Bug Fixes"
      regexp: '^fix.*'
      order: 2
    - title: "Performance"
      regexp: '^perf.*'
      order: 3
    - title: "Other"
      order: 999

brews:
  - repository:
      owner: sirerun
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: gist
    homepage: "https://github.com/sirerun/gist"
    description: "Context intelligence for LLM applications — index everything, retrieve only what matters"
    license: "Apache-2.0"
    install: |
      bin.install "gist"
    test: |
      system "#{bin}/gist", "version"

release:
  github:
    owner: sirerun
    name: gist
  prerelease: auto
  make_latest: true
