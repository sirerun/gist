name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [stable]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: gist_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install pg_trgm extension
        run: PGPASSWORD=testpass psql -h localhost -U postgres -d gist_test -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
      - name: Run tests
        env:
          GIST_TEST_DSN: postgres://postgres:testpass@localhost:5432/gist_test?sslmode=disable
        run: GOWORK=off go test ./... -race -coverprofile=coverage.out -tags=integration
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build all packages
        run: GOWORK=off go build ./...
      - name: Build binary
        run: GOWORK=off go build -o gist ./cmd/gist/

