name: E2E Brew

on:
  workflow_call:
    inputs:
      version:
        description: "Version tag to test (e.g. v1.1.0)."
        required: false
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to test (e.g. v1.1.0). Leave empty to test latest."
        required: false

jobs:
  brew-upgrade:
    name: Brew upgrade + setup
    runs-on: macos-latest
    steps:
      - name: Tap and install gist
        run: |
          brew tap sirerun/tap
          brew install sirerun/tap/gist || brew upgrade sirerun/tap/gist

      - name: Verify version
        run: |
          gist version
          if [ -n "${{ inputs.version }}" ]; then
            # Strip leading v from tag (v1.1.0 -> 1.1.0)
            expected=$(echo "${{ inputs.version }}" | sed 's/^v//')
            gist version | grep -q "$expected" || { echo "Expected $expected, got $(gist version)"; exit 1; }
          fi

      - name: Verify setup subcommand exists
        run: gist setup --help

      - name: Setup claude (dry-run)
        run: |
          output=$(gist setup claude --dry-run 2>&1)
          echo "$output"
          echo "$output" | grep -q "mcp.json"
          echo "$output" | grep -q "CLAUDE.md"

      - name: Setup all tools (dry-run)
        run: |
          for tool in claude gemini cursor copilot codex; do
            echo "--- $tool ---"
            gist setup "$tool" --dry-run 2>&1
          done

      - name: Setup claude (real install + idempotent + uninstall)
        run: |
          # Install
          gist setup claude 2>&1 | tee /tmp/setup-install.log
          grep -q "Configured Claude Code MCP" /tmp/setup-install.log
          grep -q "Added gist instructions" /tmp/setup-install.log

          # Verify files written
          cat ~/.claude/mcp.json | grep -q '"gist"'
          cat ~/.claude/CLAUDE.md | grep -q "Gist Context Management"

          # Idempotent
          gist setup claude 2>&1 | tee /tmp/setup-idem.log
          grep -q "Already configured" /tmp/setup-idem.log

          # Uninstall
          gist setup claude --uninstall 2>&1 | tee /tmp/setup-uninstall.log
          grep -q "Removed gist from" /tmp/setup-uninstall.log
          grep -q "Removed gist instructions" /tmp/setup-uninstall.log

          # Verify clean
          ! cat ~/.claude/mcp.json | grep -q '"gist"'
          ! cat ~/.claude/CLAUDE.md | grep -q "Gist Context Management"

      - name: MCP server smoke test
        run: |
          response=$(echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"e2e","version":"1.0"}}}' | gist serve 2>/dev/null)
          echo "$response"
          echo "$response" | grep -q '"gist"'
          echo "$response" | grep -q '"tools"'

      - name: MCP index + search cycle
        run: |
          response=$(printf '%s\n%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"e2e","version":"1.0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"gist_index","arguments":{"content":"Gist is a context management tool for LLM applications.","source":"e2e-test"}}}' \
            '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"gist_search","arguments":{"query":"context management"}}}' \
            | gist serve 2>/dev/null)
          echo "$response"
          echo "$response" | grep -q "e2e-test"
          echo "$response" | grep -q "bytes_used"
