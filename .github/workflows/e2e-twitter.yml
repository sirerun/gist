name: E2E Twitter

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview tweet without posting"
        required: false
        default: "true"

jobs:
  tweet-release:
    name: Index README → compose → tweet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build gist
        run: go build -o ./gist-bin ./cmd/gist

      - name: Install Mint
        run: go install github.com/sirerun/mint/cmd/mint@latest

      - name: Generate Twitter MCP from OpenAPI spec
        run: |
          curl -sL https://api.twitter.com/2/openapi.json -o /tmp/twitter-openapi.json
          mint mcp generate \
            --output ./twitter-mcp \
            --include-tags "Tweets" \
            --auth-env "TWITTER_BEARER_TOKEN" \
            /tmp/twitter-openapi.json
          cd twitter-mcp && go mod tidy && go build -o ../twitter-mcp-bin .

      - name: Index README via gist MCP
        run: |
          readme=$(cat README.md)
          json_content=$(jq -Rs . <<< "$readme")

          response=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"e2e-twitter","version":"1.0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            "{\"jsonrpc\":\"2.0\",\"id\":2,\"method\":\"tools/call\",\"params\":{\"name\":\"gist_index\",\"arguments\":{\"content\":${json_content},\"source\":\"README.md\",\"format\":\"markdown\"}}}" \
            | ./gist-bin serve 2>/dev/null)

          echo "$response"
          echo "$response" | grep -q "TotalChunks"
          echo "✓ README indexed"

      - name: Search for tweet-worthy description
        run: |
          response=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"e2e-twitter","version":"1.0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"gist_search","arguments":{"query":"context intelligence index search budget","limit":1,"budget":200}}}' \
            | ./gist-bin serve 2>/dev/null)

          echo "$response"
          echo "$response" | grep -q "bytes_used"
          echo "✓ Search returned results"

      - name: Compose and post tweet
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            version="${{ github.event.release.tag_name }}"
          else
            version="dev"
          fi

          tweet="🚀 Gist ${version} — context intelligence for AI agents.

          Index everything, retrieve only what matters. Three-tier search (stemming → trigram → fuzzy), token budgets, MCP server built in.

          brew install sirerun/tap/gist

          github.com/sirerun/gist"

          # Normalize whitespace (dedent).
          tweet=$(echo "$tweet" | sed 's/^          //')

          echo "--- Tweet (${#tweet} chars) ---"
          echo "$tweet"
          echo "---"

          if [ "${#tweet}" -gt 280 ]; then
            echo "::error::Tweet exceeds 280 characters (${#tweet})"
            exit 1
          fi

          if [ "$DRY_RUN" = "true" ]; then
            echo "::notice::Dry run — tweet not posted"
            exit 0
          fi

          # Post via Mint-generated Twitter MCP server (CLI mode).
          json_text=$(jq -Rs . <<< "$tweet")
          ./twitter-mcp-bin call createPosts text="${tweet}"

          echo "✓ Tweet posted"

      - name: Verify gist stats
        run: |
          response=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"e2e-twitter","version":"1.0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"gist_stats","arguments":{}}}' \
            | ./gist-bin serve 2>/dev/null)

          echo "$response"
          echo "$response" | grep -q "bytes_saved"
          echo "✓ Stats confirmed"
