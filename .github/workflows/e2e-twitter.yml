name: E2E Context Savings

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  context-savings:
    name: Index Twitter OpenAPI spec → search → measure savings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build gist
        run: go build -o ./gist-bin ./cmd/gist

      - name: Download Twitter OpenAPI spec
        run: |
          curl -sL https://api.twitter.com/2/openapi.json -o /tmp/twitter-openapi.json
          bytes=$(wc -c < /tmp/twitter-openapi.json)
          echo "✓ Downloaded ${bytes} bytes"

      - name: Index, search, and assert savings
        run: |
          json_content=$(jq -Rs . < /tmp/twitter-openapi.json)

          # Build all JSON-RPC messages for a single gist serve session:
          #   1. initialize
          #   2. notifications/initialized
          #   3. gist_index  (index the 754 KB spec)
          #   4-8. gist_search (five targeted queries)
          #   9. gist_stats
          response=$(printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"e2e","version":"1.0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            "{\"jsonrpc\":\"2.0\",\"id\":2,\"method\":\"tools/call\",\"params\":{\"name\":\"gist_index\",\"arguments\":{\"content\":${json_content},\"source\":\"twitter-openapi.json\",\"format\":\"json\"}}}" \
            '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"gist_search","arguments":{"query":"create tweet post","limit":3,"budget":500}}}' \
            '{"jsonrpc":"2.0","id":4,"method":"tools/call","params":{"name":"gist_search","arguments":{"query":"OAuth2 authentication scopes","limit":3,"budget":500}}}' \
            '{"jsonrpc":"2.0","id":5,"method":"tools/call","params":{"name":"gist_search","arguments":{"query":"rate limit","limit":3,"budget":500}}}' \
            '{"jsonrpc":"2.0","id":6,"method":"tools/call","params":{"name":"gist_search","arguments":{"query":"user timeline","limit":3,"budget":500}}}' \
            '{"jsonrpc":"2.0","id":7,"method":"tools/call","params":{"name":"gist_search","arguments":{"query":"search recent tweets","limit":3,"budget":500}}}' \
            '{"jsonrpc":"2.0","id":8,"method":"tools/call","params":{"name":"gist_stats","arguments":{}}}' \
            | ./gist-bin serve 2>/dev/null)

          echo "$response"

          # Verify index succeeded (id:2).
          echo "$response" | grep '"id":2' | grep -q "TotalChunks"
          echo "✓ Spec indexed"

          # Verify searches returned results (id:3-7).
          for id in 3 4 5 6 7; do
            line=$(echo "$response" | grep "\"id\":${id}")
            bytes=$(echo "$line" | jq -r '.result.content[0].text' | jq '.bytes_used')
            echo "  Search id:${id} returned ${bytes} bytes"
            if [ "$bytes" = "0" ] || [ "$bytes" = "null" ]; then
              echo "::warning::Search id:${id} returned 0 bytes"
            fi
          done
          echo "✓ All searches complete"

          # Extract stats from id:8.
          stats_json=$(echo "$response" | grep '"id":8' | jq -r '.result.content[0].text')
          bytes_indexed=$(echo "$stats_json" | jq '.bytes_indexed')
          bytes_returned=$(echo "$stats_json" | jq '.bytes_returned')
          bytes_saved=$(echo "$stats_json" | jq '.bytes_saved')
          saved_pct=$(echo "$stats_json" | jq '.saved_percent' | xargs printf '%.1f')

          echo ""
          echo "Gist Context Savings"
          echo "===================="
          echo "  Indexed:  ${bytes_indexed} bytes"
          echo "  Returned: ${bytes_returned} bytes"
          echo "  Saved:    ${bytes_saved} bytes (${saved_pct}%)"
          echo ""

          # Fail if savings are below 80%.
          saved_int=$(echo "$stats_json" | jq '.saved_percent | floor')
          if [ "$saved_int" -lt 80 ]; then
            echo "::error::Context savings ${saved_pct}% below 80% threshold"
            exit 1
          fi

          echo "✓ ${saved_pct}% context reduction on Twitter OpenAPI spec"
